name: CI

on:
  push:
  pull_request:

jobs:
  build-test-bench:
    name: Build, test and bench
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      CXX: clang++-18
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18 all
          sudo ln -sf /usr/bin/lld-18    /usr/local/bin/lld
          sudo ln -sf /usr/bin/ld.lld-18 /usr/local/bin/ld.lld
          sudo apt-get install -y zsh dash golang-go
          go install mvdan.cc/sh/v3/cmd/gosh@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          clang++-18 --version
          ld.lld-18 --version
          "$(go env GOPATH)/bin/gosh" -c 'echo gosh installed'

      - name: Build ASAN binary
        run: make shit

      - name: Run golden tests
        run: make -C test test

      - name: Build release binary
        run: rm -f shit && make MODE=rel shit

      - name: Run benchmark
        run: SCALE=200 make -C test bench

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: shit-rel
          path: shit

      - name: Build coverage binary
        run: rm -f shit && make MODE=cov shit

      - name: Run tests under coverage
        run: |
          mkdir -p coverage/profraw
          LLVM_PROFILE_FILE="$PWD/coverage/profraw/shit-%p.profraw" \
            make -C test test || true

      - name: Record coverage
        if: always()
        run: |
          llvm-profdata-18 merge -sparse coverage/profraw/*.profraw \
            -o coverage/shit.profdata
          {
            echo '## Coverage'
            echo
            echo '| File | Line cover | Branch cover |'
            echo '| --- | --- | --- |'
            llvm-cov-18 report ./shit \
              -instr-profile=coverage/shit.profdata src \
              -ignore-filename-regex='toiletline' \
              | awk 'NF>=13 && $1!="Filename" && $1!~/^-/ \
                     { print "| "$1" | "$10" | "$13" |" }'
            echo
            echo '<details><summary>Uncovered line ranges</summary>'
            echo
            echo '| File | Uncovered lines |'
            echo '| --- | --- |'
            llvm-cov-18 export ./shit \
              -instr-profile=coverage/shit.profdata src \
              -ignore-filename-regex='toiletline' -format=lcov \
              | awk '
                  /^SF:/ { f=$0; sub(/^SF:/,"",f); sub(/.*\/src\//,"",f);
                           s=0; p=0; next }
                  /^DA:/ {
                    split(substr($0,4),a,","); l=a[1]+0; c=a[2]+0;
                    if (c==0) {
                      if (s==0) { s=l; p=l }
                      else if (l==p+1) { p=l }
                      else { r[f]=r[f] (r[f]?", ":"") (s==p?s:s"-"p); s=l; p=l }
                    }
                    next
                  }
                  /^end_of_record/ {
                    if (s!=0) r[f]=r[f] (r[f]?", ":"") (s==p?s:s"-"p);
                    s=0; p=0; next
                  }
                  END { for (f in r) print "| "f" | "r[f]" |" }
                ' | sort
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"

  assert-faster-than-dash:
    name: Assert shit is faster than dash
    needs: build-test-bench
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: sudo apt-get install -y dash

      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: shit-rel

      - name: Assert
        run: |
          chmod +x shit
          cd test
          run_min() {
            min=""
            for i in 1 2 3 4 5; do
              t=$( { TIMEFORMAT=%R; time SCALE=200 "$@" bench/configure.sh \
                     >/dev/null 2>&1; } 2>&1 )
              rc=$?
              if [ "$rc" -ne 0 ] || [ -z "$t" ]; then
                echo "timing failed for '$*'" >&2
                return 1
              fi
              min=$(awk -v a="$t" -v b="$min" \
                    'BEGIN { if (b == "" || a < b) print a; else print b }')
            done
            echo "$min"
          }
          dash_seconds=$(run_min dash) || exit 1
          shit_seconds=$(run_min ../shit --no-diagnostics) || exit 1
          echo "dash=$dash_seconds shit=$shit_seconds"
          case "$dash_seconds" in ''|*[!0-9.]*) echo "bad dash timing"; exit 1;; esac
          case "$shit_seconds" in ''|*[!0-9.]*) echo "bad shit timing"; exit 1;; esac
          awk -v s="$shit_seconds" -v d="$dash_seconds" \
              'BEGIN { exit !(s + 0 > 0 && s + 0 < d + 0) }' \
            || { echo "shit is not faster than dash"; exit 1; }

  assert-faster-than-bash:
    name: Assert shit is faster than bash by at least 5 times
    needs: build-test-bench
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: shit-rel

      - name: Assert
        run: |
          chmod +x shit
          cd test
          run_min() {
            min=""
            for i in 1 2 3 4 5; do
              t=$( { TIMEFORMAT=%R; time SCALE=200 "$@" bench/configure.bash \
                     >/dev/null 2>&1; } 2>&1 )
              rc=$?
              if [ "$rc" -ne 0 ] || [ -z "$t" ]; then
                echo "timing failed for '$*'" >&2
                return 1
              fi
              min=$(awk -v a="$t" -v b="$min" \
                    'BEGIN { if (b == "" || a < b) print a; else print b }')
            done
            echo "$min"
          }
          bash_seconds=$(run_min bash) || exit 1
          shit_seconds=$(run_min ../shit --bash-compatible) || exit 1
          echo "bash=$bash_seconds shit=$shit_seconds"
          case "$bash_seconds" in ''|*[!0-9.]*) echo "bad bash timing"; exit 1;; esac
          case "$shit_seconds" in ''|*[!0-9.]*) echo "bad shit timing"; exit 1;; esac
          awk -v s="$shit_seconds" -v b="$bash_seconds" \
              'BEGIN { exit !(s + 0 > 0 && s * 5 <= b + 0) }' \
            || { echo "shit is not at least 5 times faster than bash"; exit 1; }
