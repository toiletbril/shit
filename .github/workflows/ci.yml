name: CI

on:
  push:
  pull_request:

jobs:
  build-test-bench:
    name: Build, test and bench
    runs-on: ubuntu-24.04
    container:
      image: alpine:latest
    continue-on-error: true
    steps:
      # The toolchain installs first so the checkout action has nodejs and git
      # inside the musl container, the build uses clang with lld, and dash, bash,
      # and the coreutils back the benchmark comparisons and the golden tests.
      # The git-doc pages and the mandoc man reader back the completion golden,
      # which sources git subcommands from the man1 files and git options from a
      # man git fork.
      - name: Install the toolchain
        shell: sh
        run: |
          apk add --no-cache \
            nodejs git git-doc make build-base musl-dev linux-headers clang \
            llvm lld compiler-rt yash bash dash zsh busybox coreutils mandoc
          git config --global --add safe.directory '*'
          llvm_bin=$(find /usr/lib /usr/bin -name llvm-profdata 2>/dev/null \
            | head -1 | xargs -r dirname)
          [ -n "$llvm_bin" ] && echo "$llvm_bin" >> "$GITHUB_PATH"
          clang++ --version
          ld.lld --version
          busybox | head -1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ASAN binary
        run: make shit

      - name: Run golden tests
        run: make -C test test

      - name: Build release binary
        if: '!cancelled()'
        run: make clean && make MODE=rel shit

      - name: Run benchmark
        if: '!cancelled()'
        run: SCALE=200 make -C test bench

      - name: Assert shit is faster than dash
        if: '!cancelled()'
        shell: bash
        run: |
          ./shit --version
          cd test
          run_min() {
            min=""
            for i in 1 2 3 4 5; do
              t=$( { TIMEFORMAT=%R; time SCALE=200 "$@" bench/configure.sh \
                     >/dev/null 2>&1; } 2>&1 )
              rc=$?
              if [ "$rc" -ne 0 ] || [ -z "$t" ]; then
                echo "timing failed for '$*'" >&2
                return 1
              fi
              min=$(awk -v a="$t" -v b="$min" \
                    'BEGIN { if (b == "" || a < b) print a; else print b }')
            done
            echo "$min"
          }
          dash_seconds=$(run_min dash) || exit 1
          shit_seconds=$(run_min ../shit --no-diagnostics) || exit 1
          echo "dash=$dash_seconds shit=$shit_seconds"
          case "$dash_seconds" in ''|*[!0-9.]*) echo "bad dash timing"; exit 1;; esac
          case "$shit_seconds" in ''|*[!0-9.]*) echo "bad shit timing"; exit 1;; esac
          awk -v s="$shit_seconds" -v d="$dash_seconds" \
              'BEGIN { exit !(s + 0 > 0 && s + 0 < d + 0) }' \
            || { echo "shit is not faster than dash"; exit 1; }

      - name: Assert shit is faster than bash by at least 3 times
        if: '!cancelled()'
        shell: bash
        run: |
          ./shit --version
          cd test
          run_min() {
            min=""
            for i in 1 2 3 4 5; do
              t=$( { TIMEFORMAT=%R; time SCALE=200 "$@" bench/configure.bash \
                     >/dev/null 2>&1; } 2>&1 )
              rc=$?
              if [ "$rc" -ne 0 ] || [ -z "$t" ]; then
                echo "timing failed for '$*'" >&2
                return 1
              fi
              min=$(awk -v a="$t" -v b="$min" \
                    'BEGIN { if (b == "" || a < b) print a; else print b }')
            done
            echo "$min"
          }
          bash_seconds=$(run_min bash) || exit 1
          shit_seconds=$(run_min ../shit --mood bash) || exit 1
          echo "bash=$bash_seconds shit=$shit_seconds"
          case "$bash_seconds" in ''|*[!0-9.]*) echo "bad bash timing"; exit 1;; esac
          case "$shit_seconds" in ''|*[!0-9.]*) echo "bad shit timing"; exit 1;; esac
          awk -v s="$shit_seconds" -v b="$bash_seconds" \
              'BEGIN { exit !(s + 0 > 0 && s * 3 <= b + 0) }' \
            || { echo "shit is not at least 3 times faster than bash"; exit 1; }

      - name: Build coverage binary
        if: '!cancelled()'
        run: make clean && make MODE=cov shit

      - name: Run tests under coverage
        if: '!cancelled()'
        run: |
          mkdir -p coverage/profraw
          LLVM_PROFILE_FILE="$PWD/coverage/profraw/shit-%p.profraw" \
            make -C test test BIN=../shit-cov || true

      - name: Record coverage
        if: always()
        shell: bash
        run: |
          llvm-profdata merge -sparse coverage/profraw/*.profraw \
            -o coverage/shit.profdata
          {
            echo '## Coverage'
            echo
            echo '| File | Line cover | Branch cover |'
            echo '| --- | --- | --- |'
            llvm-cov report ./shit-cov \
              -instr-profile=coverage/shit.profdata src \
              -ignore-filename-regex='toiletline' \
              | awk 'NF>=13 && $1!="Filename" && $1!~/^-/ \
                     { print "| "$1" | "$10" | "$13" |" }'
            echo
            echo '<details><summary>Uncovered line ranges</summary>'
            echo
            echo '| File | Uncovered lines |'
            echo '| --- | --- |'
            llvm-cov export ./shit-cov \
              -instr-profile=coverage/shit.profdata src \
              -ignore-filename-regex='toiletline' -format=lcov \
              | awk '
                  /^SF:/ { f=$0; sub(/^SF:/,"",f); sub(/.*\/src\//,"",f);
                           s=0; p=0; next }
                  /^DA:/ {
                    split(substr($0,4),a,","); l=a[1]+0; c=a[2]+0;
                    if (c==0) {
                      if (s==0) { s=l; p=l }
                      else if (l==p+1) { p=l }
                      else { r[f]=r[f] (r[f]?", ":"") (s==p?s:s"-"p); s=l; p=l }
                    }
                    next
                  }
                  /^end_of_record/ {
                    if (s!=0) r[f]=r[f] (r[f]?", ":"") (s==p?s:s"-"p);
                    s=0; p=0; next
                  }
                  END { for (f in r) print "| "f" | "r[f]" |" }
                ' | sort
            echo
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
