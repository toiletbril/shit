name: Release

on:
  push:
    tags: ['v*', '[0-9]*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit to build from'
        required: true
        default: master
        type: string
      tag:
        description: 'Tag name to create and attach the artifacts to'
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    name: Build or pull the cached image
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write

  build:
    name: Release / Cross-compile and attach
    needs: build-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      IMAGE: ${{ needs.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Log in to the registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the cross toolchain image
        run: docker pull "$IMAGE"

      - name: Cross-compile the three release binaries
        run: |
          docker run --rm -v "$PWD:/src" -w /src -e "VERSION=$VERSION" "$IMAGE" \
            sh -euc '
              mkdir -p dist
              make -C src MODE=rel TARGET=Linux ARCH=x86_64
              install -m 755 shit "dist/shit-linux-amd64-$VERSION"
              make -C src MODE=rel TARGET=Windows_NT ARCH=x86_64
              install -m 755 shit.exe "dist/shit-win32-amd64-$VERSION.exe"
              make -C src MODE=rel TARGET=Darwin ARCH=aarch64
              install -m 755 shit "dist/shit-darwin-aarch64-$VERSION"
            '

      - name: Upload the binaries as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shit-${{ env.VERSION }}
          path: dist/*
          if-no-files-found: error

      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.event.inputs.ref }}
          files: dist/*
