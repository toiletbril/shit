name: Release

# A tag push builds the release binary and attaches it to the release. A manual
# dispatch builds the same artifact against an existing tag. The build runs in an
# Alpine container so the binary links statically against musl libc with no
# runtime dependency. The repository Dockerfile is for development only and is
# not used here.
on:
  push:
    tags: ['v*', '[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to attach the artifacts to'
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release / Build and attach
    runs-on: ubuntu-24.04
    container:
      image: alpine:latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      # nodejs and git let the checkout action run inside the musl container, and
      # the build toolchain is clang with lld for the static-pie link.
      - name: Install the build toolchain
        run: |
          apk add --no-cache \
            build-base musl-dev linux-headers clang llvm lld make git nodejs
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      # The Linux release target links static-pie, so the artifact carries no
      # shared library dependency. The Makefile writes the binary to ./shit.
      - name: Build the static musl binary
        run: |
          make -C src MODE=rel TARGET=Linux ARCH=x86_64
          mkdir -p dist
          install -m 755 shit "dist/shit-linux-amd64-$VERSION"

      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/shit-linux-amd64-${{ env.VERSION }}
