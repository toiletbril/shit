name: Release

# A tag push builds the release binaries and attaches them to the release. A
# manual dispatch builds from a chosen branch or commit and attaches the
# artifacts to a chosen tag. The three targets cross-compile from one Alpine
# container, Linux through musl, Windows through mingw, and Darwin arm64 through
# osxcross, the same method the dedoc project uses. The repository Dockerfile is
# for development only and is not used here.
on:
  push:
    tags: ['v*', '[0-9]*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit to build from'
        required: true
        default: master
        type: string
      tag:
        description: 'Tag name to create and attach the artifacts to'
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release / Cross-compile and attach
    runs-on: ubuntu-24.04
    container:
      image: alpine:latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      # The osxcross arm64 SDK. A 10.x SDK cannot target arm64, so an 11.x or
      # newer one is required for aarch64-apple-darwin.
      MAC_SDK_URL: 'https://github.com/joseluisq/macosx-sdks/releases/download/11.3/MacOSX11.3.sdk.tar.xz'
    steps:
      # clang and lld build the static Linux binary, mingw cross-compiles the
      # Windows binary, and the rest builds osxcross for the Darwin arm64 binary.
      # nodejs and git let the checkout action run inside the musl container.
      - name: Install the cross toolchains
        run: |
          apk add --no-cache \
            build-base musl-dev linux-headers clang llvm lld make git nodejs \
            mingw-w64-gcc bash curl xz cmake patch python3 \
            libxml2-dev openssl-dev fts-dev bsd-compat-headers
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.ref || github.ref }}

      # osxcross provides oa64-clang++, the compiler the Makefile uses for a
      # Darwin target on a non-Darwin host. It is built here rather than cached,
      # since the release runs rarely.
      - name: Build the osxcross arm64 toolchain
        run: |
          git clone --depth=1 https://github.com/tpoechtrager/osxcross /opt/osxcross
          cd /opt/osxcross
          curl -L -o "tarballs/$(basename "$MAC_SDK_URL")" "$MAC_SDK_URL"
          UNATTENDED=yes OSX_VERSION_MIN=11.0 ENABLE_ARCHS=arm64 ./build.sh

      # Each target writes to ../shit or ../shit.exe and reads its own object
      # tree, so the binaries are installed into dist before the next build runs.
      - name: Cross-compile the three release binaries
        run: |
          export PATH="/opt/osxcross/target/bin:$PATH"
          mkdir -p dist

          make -C src MODE=rel TARGET=Linux ARCH=x86_64
          install -m 755 shit "dist/shit-linux-amd64-$VERSION"

          make -C src MODE=rel TARGET=Windows_NT ARCH=x86_64
          install -m 755 shit.exe "dist/shit-win32-amd64-$VERSION.exe"

          make -C src MODE=rel TARGET=Darwin ARCH=aarch64
          install -m 755 shit "dist/shit-darwin-aarch64-$VERSION"

      # The artifacts ride the workflow run too, so a dispatch can be downloaded
      # without a release.
      - name: Upload the binaries as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shit-${{ env.VERSION }}
          path: dist/*
          if-no-files-found: error

      # A dispatch creates the named tag at the chosen ref when it does not exist,
      # while a tag push reuses its own existing tag.
      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.event.inputs.ref }}
          files: dist/*
