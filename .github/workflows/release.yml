name: Release

# A tag push builds the binaries and attaches them to the release. A manual
# dispatch builds the same artifacts against an existing tag. The cross image is
# built from the repository Dockerfile, an x86_64 Linux musl binary builds
# natively in it and an aarch64 macOS binary builds through its osxcross
# toolchain.
on:
  push:
    tags: ['v*', '[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to attach the artifacts to'
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Release / Build and attach
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build the cross-compile image
        run: docker build -t shit-cross -f Dockerfile .

      # The image builds both targets in one run. The Makefile writes ../shit, so
      # each target is copied to dist before the next overwrites it.
      - name: Build the targets
        run: |
          mkdir -p dist
          docker run --rm -v "$PWD:/work" -w /work shit-cross sh -eu -c '
            make -C src MODE=rel TARGET=Linux ARCH=x86_64
            cp shit dist/shit-linux-amd64
            make -C src MODE=rel TARGET=Darwin ARCH=aarch64
            cp shit dist/shit-darwin-arm64
            chmod 0755 dist/shit-linux-amd64 dist/shit-darwin-arm64
          '

      - name: Append the version to the artifact names
        run: |
          cd dist
          mv shit-linux-amd64  "shit-linux-amd64-$VERSION"
          mv shit-darwin-arm64 "shit-darwin-arm64-$VERSION"

      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/shit-linux-amd64-${{ env.VERSION }}
            dist/shit-darwin-arm64-${{ env.VERSION }}
